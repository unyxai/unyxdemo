              <th class="right">Fee (USD)</th>
              <th>Status</th>
              <th>Reference</th>
              <th>Counterparty path</th>
              <th class="right">Metadata</th>
            </tr>
          </thead>
          <tbody>
            ${ledger.map(le=>`
              <tr class="clickable-row" data-openledger="${le.txId}" data-ledgerref="${le.reference}">
                <td class="mini">${formatDateTime(le.date)}</td>
                <td><b class="mono">${le.txId}</b></td>
                <td>${escapeHtml(le.debitAccount)}</td>
                <td>${escapeHtml(le.creditAccount)}</td>
                <td><span class="badge">${escapeHtml(le.asset)}</span></td>
                <td class="right"><b>${formatNumber(le.amount,2)}</b></td>
                <td class="right">${le.feeBps}</td>
                <td class="right">${formatBaseMoney(le.feeAbs)}</td>
                <td>${escapeHtml(le.status)}</td>
                <td class="mono">${escapeHtml(le.reference)}</td>
                <td class="mono">${escapeHtml(le.counterpartyPath)}</td>
                <td class="right"><button class="btn small" data-openledger="${le.txId}" data-ledgerref="${le.reference}">Open</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  }
  function bindLedger(){
    document.getElementById('csvBtn').onclick = ()=>{
      const ledger = buildLedger();
      const rows = ledger.map(le=>({
        date: new Date(le.date).toISOString(),
        txId: le.txId,
        debitAccount: le.debitAccount,
        creditAccount: le.creditAccount,
        asset: le.asset,
        amount: le.amount,
        feeBps: le.feeBps,
        feeAbsUsd: le.feeAbs,
        status: le.status,
        reference: le.reference,
        counterpartyPath: le.counterpartyPath
      }));
      const csv = toCsv(rows);
      downloadText(`unyx_ledger_${new Date().toISOString().slice(0,10)}.csv`, csv);
      pushNotification({ title:'Ledger exported', body:'CSV downloaded locally.', kind:'success', deepLink:{view:'ledger'} });
    };
    document.querySelectorAll('[data-openledger]').forEach(el=>{
      el.onclick = (ev)=>{
        ev.stopPropagation();
        openLedgerMetadata(el.getAttribute('data-openledger'), el.getAttribute('data-ledgerref'));
      };
    });
  }

  // ----------------------------------
  // Notifications
  // ----------------------------------
  function renderNotifications(){
    return `
    <div class="header">
      <div>
        <h1>Notifications</h1>
        <div class="sub">In-app notifications for RFQs, approvals, deposit detection, conversion, payout, settlement.</div>
      </div>
      <div class="row">
        <button class="btn" id="markAll">Mark all read</button>
      </div>
    </div>

    <div class="card section">
      <div class="title"><h2>Inbox</h2><span class="badge">${S.notifications.filter(n=>!n.read).length} unread</span></div>
      <div>
        ${S.notifications.length===0 ? `<div class="small">No notifications.</div>` : S.notifications.map(n=>`
          <div class="card" style="padding:12px; box-shadow:none; margin-bottom:10px; border-color:${n.read?'var(--border)':'rgba(246,207,84,.65)'}">
            <div class="row" style="justify-content:space-between">
              <div style="display:flex; gap:10px; align-items:flex-start">
                <span class="badge ${n.kind==='success'?'good':n.kind==='warning'?'warn':n.kind==='error'?'bad':n.kind==='info'?'blue':''}">${escapeHtml(n.kind)}</span>
                <div>
                  <div style="font-weight:900">${escapeHtml(n.title)}</div>
                  <div class="small">${escapeHtml(n.body)}</div>
                  <div class="mini" style="margin-top:6px">${formatDateTime(n.at)}</div>
                </div>
              </div>
              <div class="row">
                ${n.deepLink ? `<button class="btn small" data-openlink="${n.id}">Open</button>`:''}
                ${n.read ? `<span class="badge">Read</span>` : `<button class="btn small primary" data-read="${n.id}">Mark read</button>`}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  }
  function bindNotifications(){
    document.getElementById('markAll').onclick = ()=>{
      S.notifications.forEach(n=>n.read=true);
      rerender();
    };
    document.querySelectorAll('[data-read]').forEach(b=>{
      b.onclick=()=>{
        const id=b.getAttribute('data-read');
        const n=S.notifications.find(x=>x.id===id); if(n) n.read=true;
        rerender();
      };
    });
    document.querySelectorAll('[data-openlink]').forEach(b=>{
      b.onclick=()=>{
        const id=b.getAttribute('data-openlink');
        const n=S.notifications.find(x=>x.id===id);
        if(n){ n.read=true; S.view = n.deepLink.view; closeModal(); rerender(); }
      };
    });
  }

  // ----------------------------------
  // Settings
  // ----------------------------------
  function renderSettings(){
    return `
    <div class="header">
      <div>
        <h1>Settings</h1>
        <div class="sub">Demo toggles for common failure modes and behavior. These affect new actions in the flow.</div>
      </div>
    </div>

    <div class="grid g2">
      <div class="card section">
        <div class="title"><h2>Interface</h2><span class="badge">${S.showHelperText ? 'Helpers on' : 'Helpers off'}</span></div>
        <div class="row" style="justify-content:space-between">
          <div>
            <div style="font-weight:900">Helper text</div>
          </div>
          <input type="checkbox" id="toggleHelpers" ${S.showHelperText?'checked':''} />
        </div>
      </div>

      <div class="card section">
        <div class="title"><h2>Failure modes (common)</h2><span class="badge warn">Demo</span></div>
        <div class="divider"></div>
        <div class="row" style="justify-content:space-between">
          <div>
            <div style="font-weight:900">Quote expired</div>
            <div class="small helper-text">When selecting quote, transaction fails as quote expired.</div>
          </div>
          <input type="checkbox" id="failQuote" ${S.failQuoteExpired?'checked':''} />
        </div>
        <div class="divider"></div>
        <div class="row" style="justify-content:space-between">
          <div>
            <div style="font-weight:900">Compliance veto</div>
            <div class="small helper-text">When selecting quote, transaction fails as compliance veto.</div>
          </div>
          <input type="checkbox" id="failComp" ${S.failComplianceVeto?'checked':''} />
        </div>
      </div>

      <div class="card section">
        <div class="title"><h2>Approvals rules</h2><span class="badge yellow">4-eyes</span></div>
        <ul class="small" style="margin:10px 0 0 18px">
          <li>≥ ${formatMoney(100000,'USD')}: 2 approvals required</li>
          <li>≥ ${formatMoney(5000000,'USD')}: 3 approvals required</li>
        </ul>
      </div>
    </div>
  `;
  }
  function bindSettings(){
    const helpers = document.getElementById('toggleHelpers');
    const q = document.getElementById('failQuote');
    const c = document.getElementById('failComp');
    if(helpers){
      helpers.onchange = ()=>{
        S.showHelperText = helpers.checked;
        saveSessionPrefs();
        rerender();
      };
    }
    q.onchange = ()=>{
      S.failQuoteExpired = q.checked;
      if(q.checked) { S.failComplianceVeto = false; }
      rerender();
    };
    c.onchange = ()=>{
      S.failComplianceVeto = c.checked;
      if(c.checked) { S.failQuoteExpired = false; }
      rerender();
    };
  }

  // ----------------------------------
  // Init & live FX simulation
  // ----------------------------------
  function init(){
    loadSessionPrefs();
    applyTheme();
    S.manifest = normalizeManifest(S.manifest);
    S.baseCurrency = S.baseCurrency || S.manifest.baseCurrency || 'USD';
    // seed data
    S.beneficiaries = makeBeneficiaries();
    S.nodes = makeNodes(100);
    S.balances = makeBalances();
    S.fxPairs = makeFxPairs(S.nodes);
    S.transactions = makeTransactions();
    S.complianceDocs = seedComplianceDocs();
    S.leadRecords = [{
      id: uid('lead'),
      fullName:'Dana Mercer',
      email:'dana.mercer@aquila.example',
      organization:'Aquila Imports',
      prospectNodeType:'NBFI',
      roleType:'Viewer',
      jurisdiction:'NL',
      expectedTransactionProfile:'Supplier payouts to LATAM and APAC, 500k to 2M monthly',
      onboardingStatus:'qualified'
    }];

    // pre-load hero quotes
    const hero = S.transactions.find(t=>t.id==='TX-00001');
    if(hero) S.quotesByTx[hero.id]=makeQuotes(hero);

    // run minimal inline tests (must not throw)
    inlineTests();

    // live FX drift
    if(S.fxLiveTimer) clearInterval(S.fxLiveTimer);
    S.fxLiveTimer = setInterval(()=>{
      S.fxPairs = S.fxPairs.map((p,i)=>{
        const drift = ((Math.sin(Date.now()/60000 + i)+1)/2 - .5) * 0.0008;
        const next = Math.max(0.000001, p.last*(1+drift));
        const change = clamp(p.change24hPct + drift*100, -5, 5);
        return { ...p, last:Number(next.toFixed(6)), change24hPct:Number(change.toFixed(2)) };
      });
      if(S.view==='dashboard') rerender();
    }, 2000);

    rerender();
  }

  function inlineTests(){
    try{
      console.assert(approvalsRequired(99_999)===1, 'approvalsRequired <100k');
      console.assert(approvalsRequired(100_000)===2, 'approvalsRequired >=100k');
      console.assert(approvalsRequired(4_999_999)===2, 'approvalsRequired <5M');
      console.assert(approvalsRequired(5_000_000)===3, 'approvalsRequired >=5M');

      const csv = toCsv([{a:1,b:'x'},{a:2,b:'y'}]);
      console.assert(csv.split('\n').length===3, 'csv header + rows');
      console.assert(hash('abc')===hash('abc'), 'hash stable');

      const testTx = { amountSell:1_000_000, corridor:'LATAM → USA', usesDigitalSettlement:false, route:['Node 01','Node 02'] };
      const q0 = getPricingProfile(testTx, 0);
      const q1 = getPricingProfile(testTx, 1);
      const q2 = getPricingProfile(testTx, 2);
      console.assert(q0.feeAbs < q1.feeAbs && q1.feeAbs < q2.feeAbs, 'quote fee ladder');
      console.assert(q0.estSettleMinutes > q1.estSettleMinutes && q1.estSettleMinutes > q2.estSettleMinutes, 'quote speed ladder');

      const m = {version:1, updatedAt:0, corridors:['X'], limits:{min:1}};
      console.assert(JSON.parse(JSON.stringify(m)).version===1, 'manifest JSON roundtrip');

      console.log('UNYX demo inline tests: OK');
    }catch(e){
      console.error('UNYX demo inline tests failed', e);
    }
  }

  init();
</script>
