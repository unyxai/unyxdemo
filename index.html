<!-- UNYX Demo v1.7 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UNYX Codex Operator Console</title>
  <style>
    :root{
      --bg:#eef2f5;
      --panel:#ffffff;
      --panel-2:#f4f7fa;
      --muted:#5d6878;
      --text:#101826;
      --border:#c7d0db;
      --border-strong:#9aa8b8;
      --shadow:0 18px 38px rgba(25,42,70,.08);
      --grid:rgba(31,49,78,.06);
      --accent:#f2a900;
      --accent-2:#1f5aa6;
      --navy:#18293f;
      --steel:#132238;
      --good:#0d8b57;
      --warn:#b57806;
      --bad:#c6473f;
      --chip:#edf4fb;
      --chip2:#fbf1da;
      --chip3:#ebf7ef;
      --mono:"IBM Plex Mono","SFMono-Regular",Menlo,Monaco,Consolas,"Liberation Mono",monospace;
      --sans:"IBM Plex Sans","Source Sans 3","Segoe UI","Noto Sans","Helvetica Neue",sans-serif;
      --display:"IBM Plex Sans Condensed","Bahnschrift","Segoe UI Semibold","Noto Sans",sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:var(--sans); color:var(--text); line-height:1.55; font-size:14px;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
      background:
              radial-gradient(circle at top left, rgba(242,169,0,.10), transparent 26%),
              radial-gradient(circle at top right, rgba(31,90,166,.10), transparent 22%),
              linear-gradient(180deg, #f8fafc 0%, var(--bg) 52%, #e7edf3 100%),
              repeating-linear-gradient(90deg, var(--grid) 0 1px, transparent 1px 40px),
              repeating-linear-gradient(0deg, var(--grid) 0 1px, transparent 1px 40px);
      background-blend-mode:screen, screen, normal, multiply, multiply;
    }
    body[data-helpers="off"] .helper-text,
    body[data-helpers="off"] .sub{
      display:none !important;
    }
    a{color:var(--accent); text-decoration:none}
    .app{display:flex; min-height:100vh; width:100%; gap:18px; padding:18px;}
    .sidebar{
      width:320px; border:1px solid var(--border); background:linear-gradient(180deg, #1b2b43 0%, #243854 100%);
      padding:18px 16px; position:sticky; top:18px; height:calc(100vh - 36px); flex-shrink:0;
      display:flex; flex-direction:column; gap:14px; color:#e6edf7; border-radius:24px; overflow:hidden;
      box-shadow:0 22px 44px rgba(24,41,63,.18);
    }
    .brand{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:6px 4px;
    }
    .logo{
      display:flex; align-items:center; gap:10px;
    }
    .logo img{
      width:110px; height:32px; object-fit:contain; display:block;
    }
    .tenant{font-size:12px; padding:6px 10px; border:1px solid rgba(255,255,255,.2); border-radius:999px; background:rgba(255,255,255,.08); color:#e6edf7;}
    .card{
      background:linear-gradient(180deg, #ffffff 0%, #f9fbfd 100%); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow);
    }
    .small{font-size:12.5px; color:var(--muted); overflow-wrap:anywhere}
    .btn{
      border:1px solid var(--border); background:#ffffff; color:var(--text);
      padding:8px 12px; border-radius:9px; cursor:pointer; font-weight:700; font-size:12px;
      min-height:34px; white-space:nowrap; justify-content:center;
      display:inline-flex; gap:8px; align-items:center;
      text-transform:uppercase; letter-spacing:.06em;
      transition:.15s background ease, .15s border-color ease, .15s box-shadow ease;
    }
    .btn:hover{background:#f5f8fb; border-color:var(--border-strong); box-shadow:0 8px 18px rgba(25,42,70,.10)}
    .btn:active{box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
    .btn.primary{
      background:linear-gradient(180deg, #f4b321 0%, #e09a00 100%);
      color:#18293f; border-color:rgba(224,154,0,.45);
    }
    .btn.primary:hover{background:linear-gradient(180deg, #f7be39 0%, #e9a511 100%)}
    .btn.warn{background:#fff; border-color:#d9c08b}
    .btn.ghost{background:transparent}
    .btn.small{padding:6px 10px; min-height:30px; font-size:11px; border-radius:8px}
    .btn.pill{border-radius:999px}
    .btn.red{border-color:rgba(239,68,68,.35); background:rgba(239,68,68,.06)}
    .btn.red:hover{background:rgba(239,68,68,.10)}
    .nav{margin-top:14px; display:flex; flex-direction:column; gap:6px;}
    .nav button{
      width:100%; text-align:left; padding:10px 12px; border-radius:14px;
      border:1px solid transparent; background:transparent; cursor:pointer;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      font-weight:700; color:#e6edf7; min-height:48px;
    }
    .nav button:hover{background:rgba(255,255,255,.06)}
    .nav button.active{
      background:linear-gradient(90deg, rgba(242,169,0,.16) 0%, rgba(255,255,255,.12) 100%); border-color:rgba(242,169,0,.24);
      box-shadow:inset 0 0 0 1px rgba(242,169,0,.10);
    }
    .nav .left{display:flex; align-items:center; gap:12px}
    .nav-index{
      width:30px; height:30px; border-radius:10px; display:grid; place-items:center;
      border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.03);
      font-size:11px; color:rgba(230,237,247,.72); font-family:var(--mono);
    }
    .badge{
      font-size:12px; padding:4px 10px; border-radius:999px;
      border:1px solid var(--border); background:#fff; color:var(--muted); font-weight:700;
    }
    .badge.yellow{background:#e8dcc1; border-color:#d1c29f; color:#3c2f12}
    .badge.good{background:rgba(22,163,74,.10); border-color:rgba(22,163,74,.25); color:#0f3d1c}
    .badge.warn{background:rgba(184,130,16,.14); border-color:rgba(184,130,16,.35); color:#4b3300}
    .badge.bad{background:rgba(194,65,59,.10); border-color:rgba(194,65,59,.30); color:#4b100e}
    .badge.blue{background:rgba(59,130,246,.12); border-color:rgba(59,130,246,.30); color:#0a1c3a}
    .main{
      flex:1; padding:22px 22px 32px; min-width:0; width:100%;
      border:1px solid var(--border); border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.95) 0%, rgba(248,251,254,.98) 100%);
      box-shadow:var(--shadow);
    }
    .header{
      display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
      margin-bottom:16px;
    }
    h1{margin:0; font-size:26px; font-family:var(--display); letter-spacing:.03em; overflow-wrap:anywhere; text-transform:uppercase}
    .sub{margin-top:6px; color:var(--muted); font-size:13.5px; max-width:900px; overflow-wrap:anywhere}
    .grid{display:grid; gap:12px; align-items:stretch}
    .grid > .card{height:100%}
    .g3{grid-template-columns:repeat(3,minmax(260px,1fr))}
    .g2{grid-template-columns:repeat(2,minmax(300px,1fr))}
    .g4{grid-template-columns:repeat(4,minmax(220px,1fr))}
    @media (max-width:1100px){
      .g3,.g4{grid-template-columns:1fr}
      .sidebar{position:relative; height:auto; width:100%}
      .app{flex-direction:column}
      .main{padding:16px}
    }
    @media (max-width:900px){
      body{font-size:13.5px}
      .main{padding:14px}
      .header{gap:10px}
      .row{gap:8px}
      .section{padding:14px}
      h1{font-size:22px}
    }
    @media (max-width:640px){
      body{font-size:13px}
      .main{padding:12px}
      .sidebar{padding:14px}
      .btn{font-size:11px; padding:7px 10px}
      .btn.primary{letter-spacing:.08em}
      .tablewrap{border-radius:10px}
      .graphwrap{height:380px}
    }
    .section{padding:16px}
    .section .title{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; flex-wrap:wrap}
    .section .title h2{margin:0; font-size:13px; font-family:var(--display); letter-spacing:.06em; text-transform:uppercase; overflow-wrap:anywhere}
    .kpi{display:flex; flex-direction:column; gap:8px}
    .kpi .line{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; font-size:13px}
    .kpiCard .kpi{gap:6px}
    .kpiCard .metric{
      display:flex; align-items:baseline; justify-content:space-between; gap:12px;
      padding:6px 0; border-bottom:1px dashed rgba(185,196,211,.6);
    }
    .kpiCard .metric:last-child{border-bottom:none}
    .kpiCard .metric .label{font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:800}
    .kpiCard .metric .value{font-size:18px; font-weight:900; color:var(--steel)}
    .kpiCard.compact .metric .value{font-size:14px}
    .tablewrap{overflow:auto; border:1px solid var(--border); border-radius:12px; max-width:100%; background:#fff}
    table{
      width:100%; min-width:760px; border-collapse:collapse; font-size:11.5px; background:#fff;
      font-variant-numeric: tabular-nums; letter-spacing:.01em;
    }
    thead th{
      position:sticky; top:0; background:#eef3f9; color:#445166; text-align:left; font-weight:800; font-size:9.5px;
      border-bottom:1px solid var(--border); padding:7px; overflow-wrap:anywhere; letter-spacing:.1em; text-transform:uppercase;
    }
    tbody td{border-bottom:1px solid var(--border); padding:7px; vertical-align:top; overflow-wrap:anywhere; word-break:break-word}
    tbody tr:nth-child(even) td{background:#f7f9fc}
    tbody tr:hover td{background:#edf3fb}
    tbody tr:last-child td{border-bottom:none}
    td.right, th.right{text-align:right}
    .muted{color:var(--muted)}
    .mono{font-family:var(--mono); font-size:12px; overflow-wrap:anywhere; word-break:break-all}
    .pillrow{display:flex; gap:8px; flex-wrap:wrap}
    .pill{
      font-size:12px; padding:6px 10px; border-radius:999px;
      border:1px solid var(--border); background:#fff; font-weight:700; color:#111827;
    }
    .pill.blue{background:rgba(59,130,246,.10); border-color:rgba(59,130,246,.22); color:#0b2a52}
    .pill.yellow{background:rgba(255,224,131,.55); border-color:rgba(246,207,84,.55)}
    .pill.green{background:rgba(22,163,74,.10); border-color:rgba(22,163,74,.22); color:#0f3d1c}
    .pill.warn{background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.28); color:#5a3b00}
    .pill.red{background:rgba(239,68,68,.10); border-color:rgba(239,68,68,.28); color:#5b0a0a}
    .divider{height:1px; background:var(--border); margin:10px 0}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap; min-width:0}
    .field{display:flex; flex-direction:column; gap:6px; min-width:200px}
    label{font-size:11.5px; color:var(--muted); font-weight:800; letter-spacing:.08em; text-transform:uppercase}
    input, select, textarea{
      border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:13.5px; outline:none;
      background:#fff; max-width:100%;
    }
    textarea{min-height:160px; font-family:var(--mono); font-size:12px}
    input:focus, select:focus, textarea:focus{border-color:rgba(59,130,246,.6); box-shadow:0 0 0 4px rgba(59,130,246,.14)}
    .two{display:grid; grid-template-columns:1fr 1fr; gap:12px}
    @media (max-width:900px){.two{grid-template-columns:1fr}}
    .toaststack{position:fixed; right:16px; bottom:16px; z-index:50; display:flex; flex-direction:column; gap:10px; width:360px; max-width:calc(100vw - 32px)}
    .toast{
      background:#fff; border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); padding:12px;
      display:flex; gap:10px;
    }
    .toast .dot{width:10px; height:10px; border-radius:999px; margin-top:4px}
    .dot.info{background:var(--blue)} .dot.success{background:var(--good)} .dot.warning{background:var(--warn)} .dot.error{background:var(--bad)}
    .toast .t{font-weight:900; font-size:13px}
    .toast .b{font-size:12px; color:var(--muted); margin-top:4px}
    pre{white-space:pre-wrap; word-break:break-word}
    .modalback{
      position:fixed; inset:0; background:rgba(7,15,28,.55); z-index:60;
      display:none; align-items:center; justify-content:center; padding:18px;
    }
    .modal{
      width:min(1000px, 100%); background:#fff; border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow);
      padding:14px;
    }
    .modal .top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px}
    .modal h3{margin:0; font-size:15px}
    .modal .content{margin-top:10px}
    .modal.show{display:flex}
    .chip{
      font-size:12px; padding:6px 10px; border-radius:999px;
      background:var(--chip); border:1px solid rgba(59,130,246,.20); color:#1f2a65; font-weight:800
    }
    .chip2{background:var(--chip2); border-color:rgba(184,130,16,.28); color:#4b3300}
    .chip3{background:var(--chip3); border-color:rgba(15,139,76,.24); color:#0f3d1c}
    .expander{
      display:flex; gap:10px; align-items:center; cursor:pointer; user-select:none;
      font-weight:900;
    }
    .expicon{
      width:20px; height:20px; border-radius:8px; border:1px solid var(--border); display:grid; place-items:center; background:#fff;
    }
    .mini{
      font-size:11.5px; color:var(--muted); overflow-wrap:anywhere
    }
    .actions-row{
      display:flex; flex-wrap:wrap; justify-content:flex-end; align-items:center; gap:8px; min-width:240px;
    }
    .tx-table{min-width:1320px}
    .ledger-table{min-width:1500px}
    @media (max-width:980px){
      .actions-row{justify-content:flex-start; min-width:0}
    }
    /* Network graph */
    .graphwrap{
      border:1px solid var(--border); border-radius:12px; overflow:hidden; height:460px;
      background:linear-gradient(180deg, #f7f9fc 0%, #eef3f9 100%);
      position:relative;
    }
    .graphwrap:before{
      content:""; position:absolute; inset:0;
      background:
              repeating-linear-gradient(90deg, rgba(13,32,61,.06) 0 1px, transparent 1px 36px),
              repeating-linear-gradient(0deg, rgba(13,32,61,.06) 0 1px, transparent 1px 36px);
      pointer-events:none;
    }
    canvas{display:block; width:100%; height:100%; position:relative; z-index:1}
    .legend{display:flex; gap:10px; flex-wrap:wrap; margin-top:8px}
    .legend .item{display:flex; gap:8px; align-items:center; font-size:10px; color:var(--muted); font-weight:800; letter-spacing:.08em; text-transform:uppercase}
    .legend .sw{width:10px; height:10px; border-radius:999px}
    .sw.active{background:var(--accent)} .sw.inactive{background:#c7cbd6} .sw.high{background:var(--bad)} .sw.med{background:var(--warn)} .sw.low{background:var(--good)}
    .segmented{
      display:inline-flex; gap:6px; padding:4px; border:1px solid var(--border); border-radius:12px; background:#f2f6fb;
    }
    .segmented .seg{
      border:1px solid transparent; background:transparent; padding:6px 10px; border-radius:8px;
      font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; font-weight:800; color:var(--muted); cursor:pointer;
    }
    .segmented .seg.active{
      background:#fff; border-color:var(--border-strong); color:var(--text); box-shadow:0 6px 16px rgba(10,26,51,.12);
    }
    .ops-grid{display:grid; grid-template-columns:repeat(3,minmax(220px,1fr)); gap:10px}
    .ops-card{
      background:#fff; border:1px solid var(--border); border-radius:12px; padding:10px; position:relative;
      display:flex; flex-direction:column; gap:6px; min-height:86px;
      transition:.15s border-color ease, .15s box-shadow ease, .15s transform ease;
    }
    .ops-group{
      border:1px dashed var(--border-strong);
      background:linear-gradient(180deg, #fbfcff 0%, #f3f7fc 100%);
      border-radius:14px; padding:12px; margin-bottom:12px;
    }
    .ops-group .group-head{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:10px;
    }
    .ops-group .group-title{
      font-size:11px; letter-spacing:.12em; text-transform:uppercase; font-weight:900; color:#2b3b55;
    }
    .ops-group .group-desc{font-size:12px; color:var(--muted)}
    .ops-card:hover{border-color:var(--border-strong); box-shadow:0 8px 22px rgba(10,26,51,.12); transform:translateY(-1px)}
    .ops-card .k{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:800}
    .ops-card .v{font-size:13px; font-weight:800; color:var(--text); line-height:1.35}
    .ops-card .list{display:flex; gap:6px; flex-wrap:wrap}
    .ops-card .chip{
      font-size:10px; padding:4px 8px; border-radius:999px;
      background:#f2f6fb; border:1px solid var(--border); color:#2a3550; font-weight:800;
    }
    .ops-card[data-desc]:hover:after{
      content:attr(data-desc);
      position:absolute; left:10px; right:10px; bottom:-6px; transform:translateY(100%);
      background:#0f1d36; color:#fff; padding:8px 10px; border-radius:10px; font-size:11px; line-height:1.35;
      box-shadow:0 10px 24px rgba(10,26,51,.25); z-index:5;
    }
    @media (max-width:1100px){
      .ops-grid{grid-template-columns:repeat(2,minmax(220px,1fr))}
    }
    @media (max-width:700px){
      .ops-grid{grid-template-columns:1fr}
    }
    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 0 2px; margin-bottom:8px; flex-wrap:wrap;
    }
    .topbar .meta{
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      font-size:12.5px; color:var(--muted);
    }
    .topbar .controls{
      display:flex; align-items:flex-end; gap:10px; flex-wrap:wrap;
    }
    .topbar .field{
      min-width:170px;
    }
    .topbar .meta .pill{
      padding:5px 10px; border-radius:999px; border:1px solid var(--border);
      background:#fff; font-weight:700; color:var(--text);
    }
    .table-controls{
      display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px;
      align-items:flex-end;
    }
    .table-controls .field{
      min-width:160px;
      flex:1 1 160px;
    }
    .table-controls .field.compact{
      flex:0 0 180px;
    }
    .sortable{
      cursor:pointer;
      user-select:none;
    }
    .sortable.active{
      color:var(--accent-2);
    }
    .clickable-row{
      cursor:pointer;
    }
    .clickable-row td:first-child b,
    .clickable-row td:first-child .mono{
      text-decoration:underline;
      text-underline-offset:2px;
    }
    .detail-grid{
      display:grid; gap:12px; grid-template-columns:minmax(0,1.7fr) minmax(280px,.9fr);
    }
    @media (max-width:1100px){
      .detail-grid{grid-template-columns:1fr}
    }
    .sidepanel{
      border:1px solid var(--border); border-radius:14px; background:#fff; padding:14px;
      min-height:100%;
    }
    .workflow{
      display:grid; gap:10px;
    }
    .workflow-stage{
      display:grid; grid-template-columns:26px 1fr auto; gap:10px; align-items:flex-start;
      padding:10px 12px; border:1px solid var(--border); border-radius:12px; background:#fff;
    }
    .workflow-stage.done{border-color:rgba(15,139,76,.3); background:rgba(232,244,237,.7)}
    .workflow-stage.current{border-color:rgba(59,130,246,.34); background:rgba(231,238,248,.9)}
    .workflow-stage.manual{border-color:rgba(184,130,16,.34); background:rgba(243,239,228,.95)}
    .workflow-stage.failed{border-color:rgba(194,65,59,.34); background:rgba(255,241,241,.9)}
    .workflow-dot{
      width:26px; height:26px; border-radius:999px; display:grid; place-items:center;
      font-size:11px; font-weight:900; color:#fff; background:var(--border-strong);
    }
    .workflow-stage.done .workflow-dot{background:var(--good)}
    .workflow-stage.current .workflow-dot{background:var(--accent)}
    .workflow-stage.manual .workflow-dot{background:var(--warn)}
    .workflow-stage.failed .workflow-dot{background:var(--bad)}
    .workflow-stage .name{font-weight:900}
    .workflow-stage .time{font-size:11.5px; color:var(--muted); text-align:right}
    .ring-note{
      display:flex; gap:10px; flex-wrap:wrap; margin-top:8px;
      font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--muted);
    }
    .ring-note span{
      display:inline-flex; align-items:center; gap:6px;
    }
    .ring-note i{
      width:10px; height:10px; border-radius:999px; display:inline-block;
    }
    .meta-list{
      display:grid; gap:8px;
    }
    .meta-row{
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
      border-bottom:1px dashed rgba(185,196,211,.7); padding-bottom:8px;
    }
    .meta-row:last-child{border-bottom:none; padding-bottom:0}
    .lead-hero{
      background:linear-gradient(135deg, #f4f7fb 0%, #e9f0f8 100%);
      color:var(--text);
      border-color:#bfcbd8;
    }
    .lead-hero .sub,
    .lead-hero .small,
    .lead-hero label{color:#536172}
    .lead-hero input,
    .lead-hero select,
    .lead-hero textarea{
      background:#fff;
    }
    .wizard-steps{display:flex; gap:6px; flex-wrap:wrap}
    .wizard-steps .step{
      padding:6px 10px; border-radius:999px; border:1px solid var(--border); font-size:10px;
      letter-spacing:.1em; text-transform:uppercase; font-weight:800; color:var(--muted); background:#f7f9fc;
    }
    .wizard-steps .step.active{
      background:#fff; color:var(--text); border-color:var(--border-strong); box-shadow:0 6px 16px rgba(10,26,51,.12);
    }
    .wizard-footer{display:flex; justify-content:space-between; gap:10px; margin-top:12px}
    .progress{
      width:100%; height:6px; border-radius:999px; background:#e7edf6; overflow:hidden; border:1px solid var(--border);
      margin-top:6px;
    }
    .progress .bar{
      height:100%; background:linear-gradient(90deg, #274b8f 0%, #3b82f6 100%);
      width:0%;
    }
    /* Login */
    .login{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:18px}
    .loginGrid{display:grid; grid-template-columns:1fr 1fr; gap:14px; width:min(980px, 100%)}
    @media (max-width:900px){.loginGrid{grid-template-columns:1fr}}
    .noteBox{border:1px solid #d9c08b; background:#f3efe4; border-radius:14px; padding:12px}
    .foot{margin-top:14px; font-size:12px; color:var(--muted)}
  </style>
</head>

<!-- Toasts -->

<script>
  /**
   * UNYX Demo SPA — Single Copy/Paste HTML
   *
   * What it simulates (per your spec):
   * - Light theme, clean business financial UI for NBFIs needing FX + cross-border multi-hop + fiat→digital settlement→fiat
   * - Menu order: Dashboard → Balances → Transactions → Network → Compliance → Manifest → Ledger → Notifications → Settings
   * - Single tenant
   * - Mock login flow (tenant + email + role)
   * - Transaction flow: RFQ → quotes → approvals (4-eyes & thresholds) → deposit instructions → deposit detected → confirm deposit → conversion (part of quote approval; no separate TTL UI) → payout → settled
   * - Beneficiary pre-approval shown as part of RFQ
   * - Fees shown as bps + absolute USD
   * - Base currency normalized to USD
   * - Failures emphasized: quote expired & compliance veto (toggle in Settings)
   * - Assets & corridors: MXN, ARS, USD, HKD, ZAR, NGN, SGD, THB, PLN, plus USDC/EURC/BTC in balances
   * - Network view: graph visualization (not a table). Node names, health, latency, depth/liquidity visible.
   * - Transactions expandable for drill-down (advanced details)
   * - Ledger tab: accounting-style columns, export CSV
   * - Notifications center: in-app only
   * - Compliance + Manifest: separate verification states; compliance docs add; manifest JSON update modal with live preview; Apply ALWAYS works and marks manifest Submitted + bumps version + timestamp
   *
   * No frameworks. All in-memory. Replace simulated feeds with real data later.
   */

  const S = {

        riskScoringModel: 'UNYX v3',

        autoCancelOnStaleRates: true
      },
      settlement: { digitalSettlement:true, whitelistRequiredForDigital:true },

    },
    manifestLastChange: 'Initial manifest',
    // data
    beneficiaries: [],
    nodes: [],
    balances: [],
    fxPairs: [],
    fxLiveTimer: null,
    transactions: [],
    quotesByTx: {},     // txId -> quotes[]
    quoteLoading: {},   // txId -> bool
    expandedTx: new Set(), // txIds expanded
    // notifications
    notifications: [
      { id: uid('n'), at: Date.now()-14*60e3, title:'Welcome to UNYX', body:'Demo tenant loaded: 50 transactions, 12 assets, 100 nodes.', kind:'info', read:false, deepLink:{view:'dashboard'} },
      { id: uid('n'), at: Date.now()-48*60e3, title:'RFQ broadcast', body:'TX-00008 sent to network participants.', kind:'info', read:true, deepLink:{view:'transactions'} },
      { id: uid('n'), at: Date.now()-92*60e3, title:'Quotes ready', body:'RFQ returned quotes for TX-00005.', kind:'success', read:false, deepLink:{view:'transactions'} },
      { id: uid('n'), at: Date.now()-3.2*3600e3, title:'Deposit detected', body:'Funds detected for TX-00012. Confirm to continue.', kind:'warning', read:true, deepLink:{view:'transactions'} },
      { id: uid('n'), at: Date.now()-5.8*3600e3, title:'Settled', body:'TX-00003 settled. Ledger entries available.', kind:'success', read:true, deepLink:{view:'ledger'} },
      { id: uid('n'), at: Date.now()-9.4*3600e3, title:'Compliance note', body:'Additional KYB document required for Kipepeo Logistics Ltd.', kind:'error', read:true, deepLink:{view:'compliance'} },
    ],
    // network graph
    graph: { nodes:[], edges:[], positions:new Map(), hovered:null, dragging:false, dragId:null }
  };

  const ASSETS = [
    { code:'USD', name:'US Dollar' },
    { code:'MXN', name:'Mexican Peso' },
    { code:'ARS', name:'Argentine Peso' },
    { code:'HKD', name:'Hong Kong Dollar' },
    { code:'ZAR', name:'South African Rand' },
    { code:'NGN', name:'Nigerian Naira' },
    { code:'SGD', name:'Singapore Dollar' },
    { code:'THB', name:'Thai Baht' },
    { code:'PLN', name:'Polish Złoty' },
    { code:'USDC', name:'USD Coin' },
    { code:'EURC', name:'Euro Coin' },
    { code:'BTC', name:'Bitcoin' },
  ];

  const SESSION_PREFS_KEY = 'unyx_demo_session_prefs_v2';
  const BASE_CURRENCY_RATES = {
    USD: 1,
    EUR: 0.92,
    MXN: 17.1,
    SGD: 1.34,
    GBP: 0.78,
    HKD: 7.82,
    ZAR: 18.4,
    NGN: 1540,
    THB: 35.8,
    PLN: 3.96,
    USDC: 1,
    EURC: 0.92,
    BTC: 0.000013
  };

  function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }
  function uid(prefix){ return `${prefix}_${Math.random().toString(16).slice(2)}_${Date.now().toString(16)}`; }
  function hash(str){ let h=0; for(let i=0;i<str.length;i++) h = (h*31 + str.charCodeAt(i))|0; return h; }
  function formatNumber(n, digits=2){ return new Intl.NumberFormat(undefined,{maximumFractionDigits:digits}).format(n); }
  function formatMoney(n, currency){
    try{
      const max = Math.abs(n) >= 1000 ? 0 : 4;
      return new Intl.NumberFormat(undefined,{style:'currency', currency, maximumFractionDigits:max}).format(n);
    }catch{ return `${currency} ${Number(n).toFixed(2)}`; }
  }
  function formatDateTime(ts){ return new Date(ts).toLocaleString(); }
  function applyTheme(){
    S.theme = 'light';
    document.body.setAttribute('data-theme', 'light');
    document.body.setAttribute('data-helpers', S.showHelperText ? 'on' : 'off');
  }
  function getCurrencyRate(code){ return BASE_CURRENCY_RATES[code] || 1; }
  function convertAmount(amount, fromCurrency='USD', toCurrency='USD'){
    const usdAmount = Number(amount||0) / getCurrencyRate(fromCurrency);
    return usdAmount * getCurrencyRate(toCurrency);
  }
  function formatBaseMoney(usdAmount, digits=2){
    const base = S.baseCurrency || 'USD';
    return formatMoney(convertAmount(usdAmount, 'USD', base), base);
  }
  function normalizeAssetValue(amount, currency){
    return convertAmount(amount, currency, 'USD');
  }
  function splitCsvInput(value){
    return String(value||'').split(',').map(s=>s.trim()).filter(Boolean);
  }
  function saveSessionPrefs(){
    try{
      sessionStorage.setItem(SESSION_PREFS_KEY, JSON.stringify({
        currentRole: S.currentRole,
        baseCurrency: S.baseCurrency,
        showHelperText: !!S.showHelperText
      }));
    }catch{}
  }
  function loadSessionPrefs(){
    try{
      const raw = sessionStorage.getItem(SESSION_PREFS_KEY);
      if(!raw) return;
      const parsed = JSON.parse(raw);
      if(parsed.currentRole) S.currentRole = parsed.currentRole;
      if(parsed.baseCurrency) S.baseCurrency = parsed.baseCurrency;
      if(typeof parsed.showHelperText === 'boolean') S.showHelperText = parsed.showHelperText;
    }catch{}
  }
  function normalizeManifest(manifest){
    const next = { ...manifest };
    next.whitelistedCurrencies = Array.isArray(next.whitelistedCurrencies) ? next.whitelistedCurrencies : [];
    next.whitelistedJurisdictions = Array.isArray(next.whitelistedJurisdictions) ? next.whitelistedJurisdictions : [];
    next.blacklistedCurrencies = Array.isArray(next.blacklistedCurrencies) ? next.blacklistedCurrencies : [];
    next.blacklistedJurisdictions = Array.isArray(next.blacklistedJurisdictions) ? next.blacklistedJurisdictions : [];
    next.manualApprovalCurrencies = Array.isArray(next.manualApprovalCurrencies) ? next.manualApprovalCurrencies : [];
    next.manualApprovalJurisdictions = Array.isArray(next.manualApprovalJurisdictions) ? next.manualApprovalJurisdictions : [];
    next.blockedNodeIds = Array.isArray(next.blockedNodeIds) ? next.blockedNodeIds : [];
    return next;
  }

  function approvalsRequired(amountUsd){
    if(amountUsd >= 5_000_000) return 3;
    if(amountUsd >= 100_000) return 2;
    return 1;
  }

  function getSenderProfiles(){
    const primaryName = S.session?.tenant || S.tenant || 'UNYX Treasury Desk';
    const primaryContact = S.session?.email || S.email || 'treasury@unyx.ai';
    return [
      { id:'sender_primary', name:primaryName, type:'Treasury', detail:primaryContact },
      { id:'sender_ops', name:'UNYX Operations Hub', type:'Operations', detail:'ops-routing@unyx.ai' },
      { id:'sender_liquidity', name:'UNYX Liquidity Desk', type:'Liquidity', detail:'liquidity@unyx.ai' }
    ];
  }

  function getBeneficiaryById(id){
    return S.beneficiaries.find(b=>b.id===id) || null;
  }

  function getApprovedBeneficiaries(){
    return S.beneficiaries.filter(b=>b.preApproved);
  }

  function getJurisdictionName(code){
    return ({
      MX:'Mexico',
      NG:'Nigeria',
      HK:'Hong Kong',
      DE:'Germany',
      SG:'Singapore',
      PL:'Poland',
      KE:'Kenya',
      US:'United States',
      NL:'Netherlands',
      GB:'United Kingdom'
    })[code] || code || 'Unknown';
  }

  function getRegionFromCorridor(corridor){
    return String(corridor || '').split('→')[0].trim() || 'Global';
  }

  function getReceiverProfile(receiver){
    if(!receiver){
      return {
        jurisdictionCode:'',
        jurisdictionName:'Not selected',
        region:'Not selected',
        corridor:'Not selected',
        rail:'Not selected'
      };
    }
    return {
      jurisdictionCode:receiver.jurisdiction,
      jurisdictionName:getJurisdictionName(receiver.jurisdiction),
      region:getRegionFromCorridor(receiver.preferredCorridor),
      corridor:receiver.preferredCorridor || 'Not mapped',
      rail:receiver.type==='Digital' ? 'Digital settlement' : 'Bank rails'
    };
  }

  function getPricingProfile(tx, variantIndex=0){
    const fees = S.manifest.fees;
    const costs = S.manifest.costs;
    const corridorMarkup = tx.corridor ? fees.corridorMarkupBps : 0;
    const digitalMarkup = tx.usesDigitalSettlement ? fees.conversionMarkupBps : 0;
    const serviceLadders = [
      { label:'Economy', feeAdjBps:-4, etaAdjMinutes:14 },
      { label:'Balanced', feeAdjBps:0, etaAdjMinutes:7 },
      { label:'Priority', feeAdjBps:5, etaAdjMinutes:0 }
    ];
    const tier = serviceLadders[variantIndex] || serviceLadders[1];
    const feeBps = Math.max(1, fees.baseFeeBps + corridorMarkup + digitalMarkup + tier.feeAdjBps);
    const rawFeeUsd = (Number(tx.amountSell || 0) * (feeBps / 10_000)) + costs.networkFeeUsd + costs.opsHandlingUsd + (tx.usesDigitalSettlement ? costs.settlementFeeUsd : 0);
    const feeAbs = clamp(Math.round(rawFeeUsd / 10) * 10, fees.minFeeUsd, fees.maxFeeUsd);
    const baseEta = (tx.usesDigitalSettlement ? 14 : 24) + Math.max(0, ((tx.route || []).length - 2) * 4);
    const estSettleMinutes = baseEta + tier.etaAdjMinutes;
    return { label:tier.label, feeBps, feeAbs, estSettleMinutes };
  }

  // ----------------------------------
  // Data generation
  // ----------------------------------
  function makeBeneficiaries(){
    return [
      { id:'ben_1', name:'Aquila Imports S.A. (MX)', type:'Bank', identifier:'IBAN: DE12 5001 0517 5407 3249 31', jurisdiction:'MX', preferredCorridor:'LATAM → USA', preApproved:true },
      { id:'ben_2', name:'Kipepeo Logistics Ltd (NG)', type:'Bank', identifier:'IBAN: GB29 NWBK 6016 1331 9268 19', jurisdiction:'NG', preferredCorridor:'AFRICA → USA', preApproved:true },
      { id:'ben_3', name:'Southport Trading (HK)', type:'Digital', identifier:'0x2f1b…9a2c (whitelisted)', jurisdiction:'HK', preferredCorridor:'APAC → USA', preApproved:true },
      { id:'ben_4', name:'Helios Components GmbH (DE)', type:'Bank', identifier:'IBAN: DE44 5001 0517 5407 3249 33', jurisdiction:'DE', preferredCorridor:'EU → USA', preApproved:true },
      { id:'ben_5', name:'Blue Harbor Foods (SG)', type:'Bank', identifier:'IBAN: SG12 7001 0517 5407 3249 01', jurisdiction:'SG', preferredCorridor:'APAC → USA', preApproved:false },
      { id:'ben_6', name:'Orion Textiles Ltd (PL)', type:'Bank', identifier:'IBAN: PL12 5001 0517 5407 3249 12', jurisdiction:'PL', preferredCorridor:'EU → USA', preApproved:true },
      { id:'ben_7', name:'NairoPay Services (KE)', type:'Digital', identifier:'0x7c9a…3b1e (whitelisted)', jurisdiction:'KE', preferredCorridor:'AFRICA → USA', preApproved:true },
    ];
  }
  function makeNodes(n=100){
    const corridors = S.manifest.corridors;
    const out=[];
    for(let i=0;i<n;i++){
      const cCount = 1 + (i%2);
      const cs = Array.from({length:cCount}).map((_,k)=>corridors[(i+k)%corridors.length]);
      const risk = (i%17===0) ? 'High' : (i%5===0) ? 'Med' : 'Low';
      out.push({
        id:`node_${i+1}`,
        name:`Node ${String(i+1).padStart(2,'0')}`,
        active: i%9!==0,
        nbi: i%3===0,
        health: clamp(65 + ((i*7)%38), 0, 100),
        latencyMs: 18 + ((i*11)%140),
        corridors: cs,
        liquidityUsd: 150_000 + ((i*97_000)%18_000_000),
        riskTag: risk,
        makersOnline: 1 + ((i*3)%11),
        jurisdiction: ['US','MX','SG','ZA','NG','HK','PL','TH','AR'][i%9],
        rail: (i%3===0) ? 'NBI' : (i%3===1 ? 'RTGS' : 'Stablechain'),
      });
    }
    return out;
  }
  function makeBalances(){
    return ASSETS.slice(0,12).map((a,i)=>{
      const balance = a.code==='USD' ? 8_500_000 : 20_000 + (i*17_777)%350_000;
      const locked = Number((balance * (0.04 + (i%4)*0.03)).toFixed(2));
      const available = Number((balance - locked).toFixed(2));
      const assetType =
              a.code==='USD' || a.code==='MXN' || a.code==='HKD' || a.code==='SGD' ? 'fiat' :
                      (a.code==='USDC' || a.code==='EURC') ? 'stablecoin' :
                              a.code==='BTC' ? 'token' :
                                      (i%5===0 ? 'deposit' : 'token');
      const usd = convertAmount(balance, a.code, 'USD');
      return {
        assetName: a.name,
        assetCode: a.code,
        assetType,
        balance,
        available,
        locked,
        feeType: assetType==='stablecoin' ? 'Gas + bps' : assetType==='deposit' ? 'Flat + bps' : 'Bps',
        stablecoinFlag: assetType==='stablecoin' || assetType==='token',
        depositEnabled: i%4!==0,
        withdrawalEnabled: i%5!==0,
        networkRail: assetType==='stablecoin' || assetType==='token' ? 'Stablechain' : (assetType==='deposit' ? 'Virtual Account' : ['SWIFT','SEPA','RTGS','NBI'][i%4]),
        jurisdiction: ['US','MX','SG','ZA','NG','HK','PL','TH','AR','NL','DE','GB'][i%12],
        usdValue: usd
      };
    });
  }
  function pickRoute(nodes, hops, seed){
    const start = Math.abs(hash(seed)) % Math.max(1, nodes.length - hops);
    return Array.from({length:hops}).map((_,i)=>nodes[start+i].name);
  }
  function makeFxPairs(nodes){
    const pairs = ['USD/MXN','USD/ARS','USD/HKD','USD/ZAR','USD/NGN','USD/SGD','USD/THB','USD/PLN'];
    const pickRouteName=(pair)=>{
      const idx = Math.abs(hash(pair)) % Math.max(1, nodes.length-3);
      return [nodes[idx].name, nodes[idx+1].name, nodes[idx+2].name].join(' → ');
    };
    return pairs.map((p,i)=>{
      const base = 1 + (i*0.7);
      return {
        pair:p,
        last:Number((base*(1+(i%3)*0.13)).toFixed(6)),
        spreadBps: 8 + (i%5)*6,
        change24hPct: Number((((i%4)-1.5)*0.3).toFixed(2)),
        depthUsd: 2_000_000 + (i*1_450_000)%22_000_000,
        makersOnline: 12 + (i*7)%55,
        bestRoute: pickRouteName(p),
      };
    });
  }
  function makeTransactions(){
    const now = Date.now();
    const txs=[];
    const sellChoices=['USD','MXN','ARS','HKD','ZAR','NGN','SGD','THB','PLN'];
    const buyChoices=['USD','USDC','EURC','MXN','ZAR','SGD','THB'];
    for(let i=0;i<50;i++){
      const sell = sellChoices[i%sellChoices.length];
      const buy = buyChoices[(i*3)%buyChoices.length];
      const amount = 100_000 + ((i*317_000)%14_900_000);
      const corridor = S.manifest.corridors[i%S.manifest.corridors.length];
      const ben = S.beneficiaries[i%S.beneficiaries.length];
      const digital = (buy==='USDC'||buy==='EURC');
      let status = (i%11===0) ? 'Failed' : (i%7===0) ? 'Processing' : (i%5===0) ? 'Settled' : 'Quotes Ready';
      let failure = (status==='Failed') ? ((i%2===0)?'quote_expired':'compliance_veto') : null;
      let complianceState = (failure==='compliance_veto') ? 'Veto' : 'OK';
      const req = approvalsRequired(amount);
      const granted = (status==='Settled'||status==='Processing') ? req : Math.min(req, i%(req+1));
      const providerTotal = (status==='Quotes Ready') ? 7 : 0;
      const providerAccepted = (status==='Quotes Ready') ? Math.min(3, providerTotal) : 0;
      const dep = (status==='Settled' || status==='Processing') ? {
        method: digital ? 'Digital' : 'IBAN',
        account: digital ? '0xUNYX_DEPOSIT_VAULT' : 'IBAN: NL91 ABNA 0417 1643 00',
        reference: `UNYX-${String(i+1).padStart(4,'0')}-${Math.abs(hash(`${i}`))%9999}`,
        whitelistRequired: digital ? true : false
      } : null;
      txs.push({
        id:`TX-${String(i+1).padStart(5,'0')}`,
        createdAt: now - i*42*60e3,
        sellAsset:sell,
        buyAsset:buy,
        amountSell:amount,
        senderId:'sender_primary',
        senderName:'UNYX Treasury Desk',
        receiverName:ben.name,
        beneficiaryId:ben.id,
        purpose:['Supplier payment','Treasury rebalance','Invoice settlement','Cross-border payout'][i%4],
        corridor,
        route: ['Node 02','Node 09','Node 21'].slice(0, digital?3:2),
        usesDigitalSettlement:digital,
        status,
        failure,
        complianceState,
        approvalsRequired:req,
        approvalsGranted:granted,
        providerTotal,
        providerAccepted,
        selectedQuoteId:null,
        depositInstructions:dep,
        events:[
          { at: now - i*42*60e3, label:'Created' },
          { at: now - i*42*60e3 + 6*60e3, label:'RFQ Requested' },
          { at: now - i*42*60e3 + 9*60e3, label:'Quotes Ready' },
        ]
      });
    }
    // hero flow TX-00001
    if(txs[0]){
      txs[0].status='Quotes Ready';
      txs[0].approvalsGranted=0;
      txs[0].failure=null;
      txs[0].complianceState='OK';
      txs[0].usesDigitalSettlement=true;
      txs[0].buyAsset='USDC';
      txs[0].sellAsset='MXN';
      txs[0].amountSell=1_250_000;
      txs[0].events=[
        { at: Date.now()-28*60e3, label:'Created' },
        { at: Date.now()-24*60e3, label:'RFQ Requested', detail:'Receiver pre-approved at RFQ' },
        { at: Date.now()-21*60e3, label:'Quotes Ready' },
      ];
      txs[0].approvalsRequired = approvalsRequired(txs[0].amountSell);
    }
    return txs;
  }
  function makeQuotes(tx){
    const now=Date.now();
    const baseRate = 1 + (Math.abs(hash(tx.sellAsset+tx.buyAsset))%1000)/10_000;
    const routes = [
      pickRoute(S.nodes, 4, tx.id+'a'),
      pickRoute(S.nodes, 3, tx.id+'b'),
      pickRoute(S.nodes, 2, tx.id+'c'),
    ];
    return routes.map((r,i)=>{
      const pricing = getPricingProfile(tx, i);
      return {
        id: uid('q'),
        providerNodePath: r.join(' → '),
        serviceTier: pricing.label,
        rate: Number(baseRate.toFixed(6)),
        spreadBps:12,
        feeBps:pricing.feeBps,
        feeAbs:pricing.feeAbs,
        estSettleMinutes:pricing.estSettleMinutes,
        depthUsd:2_000_000 + i*3_000_000,
        createdAt: now,
      };
    });
  }
  function buildLedger(){
    const out=[];
    for(const t of S.transactions.slice(0,50)){
      const selectedQuote = (S.quotesByTx[t.id]||[]).find(q=>q.id===t.selectedQuoteId);
      const pricing = selectedQuote || getPricingProfile(t, 0);
      const feeBps = pricing.feeBps;
      const feeAbs = pricing.feeAbs;
      const ref = (t.depositInstructions && t.depositInstructions.reference) ? t.depositInstructions.reference : `REF-${t.id.slice(-4)}-${Math.abs(hash(t.id))%9999}`;
      const path = t.route.join(' → ');
      out.push({
        id: uid('le'),
        txId:t.id,
        date:t.createdAt,
        debitAccount:'Client Settlement (USD base)',
        creditAccount:'Counterparty Settlement',
        asset:t.sellAsset,
        amount:t.amountSell,
        feeBps, feeAbs,
        status:t.status,
        reference:ref,
        counterpartyPath:path
      });
      out.push({
        id: uid('le'),
        txId:t.id,
        date:t.createdAt+60e3,
        debitAccount:'Fees Payable',
        creditAccount:'Platform Revenue',
        asset:'USD',
        amount:feeAbs,
        feeBps, feeAbs,
        status:t.status,
        reference:`${ref}-FEE`,
        counterpartyPath:'UNYX'
      });
    }
    return out;
  }

  function toast(kind, title, body){
    const wrap = document.getElementById('toasts');

    el.className='toast';
    el.innerHTML = `
    <div class="dot ${kind}"></div>
    <div style="flex:1">
      <div class="t">${escapeHtml(title)}</div>
      <div class="b">${escapeHtml(body)}</div>
    </div>
    <button class="btn small ghost" aria-label="dismiss">✕</button>
  `;
    wrap.appendChild(el);
    el.querySelector('button').onclick=()=>el.remove();
    setTimeout(()=>{ if(el.isConnected) el.remove(); }, 5200);
  }
  function escapeHtml(s){

  function bindRfqWizard(){
    const w = S.rfqWizard;
    if(!w) return;
    const collect = ()=>{
      const get = (id)=>document.getElementById(id);
      if(get('rfqSell')) w.form.sellAsset = get('rfqSell').value;
      if(get('rfqBuy')) w.form.buyAsset = get('rfqBuy').value;
      if(get('rfqAmount')) w.form.amountSell = Number(get('rfqAmount').value || 0);
      if(get('rfqSender')) w.form.senderId = get('rfqSender').value;
      if(get('rfqBen')) w.form.beneficiaryId = get('rfqBen').value;
      if(get('rfqType')) w.form.transactionType = get('rfqType').value;
      if(get('rfqSettle')) w.form.settlementType = get('rfqSettle').value;
      if(get('rfqPurpose')) w.form.purpose = get('rfqPurpose').value;
      const receiver = getBeneficiaryById(w.form.beneficiaryId);
      if(receiver?.preferredCorridor) w.form.corridor = receiver.preferredCorridor;
      if(receiver?.type==='Digital' && (!get('rfqSettle') || !get('rfqSettle').value)) w.form.settlementType = 'digital';
    };
    const next = document.getElementById('rfqNext');
    const back = document.getElementById('rfqBack');
    const submit = document.getElementById('rfqSubmit');
    const addReceiver = document.getElementById('rfqAddReceiver');
    if(next){
      next.onclick = ()=>{
        collect();
        if(w.step===0){
          if(w.form.sellAsset===w.form.buyAsset){
            toast('warning','Currencies must differ','Sell and buy currencies cannot be the same.');
            return;
          }
          if(!w.form.amountSell || w.form.amountSell < S.manifest.limits.min){
            toast('warning','Amount too low',`Minimum is ${formatMoney(S.manifest.limits.min,'USD')}.`);
            return;
          }
        }
        if(w.step===1 && !w.form.beneficiaryId){
          toast('warning','Receiver required','Select a receiver before continuing.');
          return;
        }
        w.step = Math.min(4, w.step+1);
        refreshRfqWizard();
      };
    }
    if(back){
      back.onclick = ()=>{
        collect();
        w.step = Math.max(0, w.step-1);
        refreshRfqWizard();
      };
    }
    if(submit){
      submit.onclick = ()=>{
        collect();
        createRfqFromWizard(w.form);
      };
    }
    const benSelect = document.getElementById('rfqBen');
    if(benSelect){
      benSelect.onchange = ()=>{
        const nextReceiver = getBeneficiaryById(benSelect.value);
        if(nextReceiver?.preferredCorridor) w.form.corridor = nextReceiver.preferredCorridor;
        w.form.beneficiaryId = benSelect.value;
        w.form.settlementType = nextReceiver?.type==='Digital' ? 'digital' : 'bank';
      };
    }
    if(addReceiver){
      addReceiver.onclick = ()=>{
        collect();
        openReceiverWizard();
      };
    }
  }
  function createRfqFromWizard(form){
    const receiver = getBeneficiaryById(form.beneficiaryId);
    const receiverProfile = getReceiverProfile(receiver);
    const id = `TX-${String(S.transactions.length+1).padStart(5,'0')}`;
    const providerTotal = 7;
    const tx = {
      id, createdAt: Date.now(),
      sellAsset: form.sellAsset, buyAsset: form.buyAsset,
      amountSell: Number(form.amountSell || 0),
      senderId: form.senderId,
      senderName: getSenderProfiles().find(x=>x.id===form.senderId)?.name || 'UNYX Treasury Desk',
      receiverName: receiver?.name || '',
      receiverJurisdiction: receiverProfile.jurisdictionCode,
      receiverRegion: receiverProfile.region,
      beneficiaryId: form.beneficiaryId,
      purpose: form.purpose || 'RFQ',
      corridor: receiverProfile.corridor,
      route: ['Node 02','Node 09'],
      usesDigitalSettlement: form.settlementType==='digital',
      status:'RFQ Requested',
      failure:null,
      complianceState:'OK',
      approvalsRequired: approvalsRequired(Number(form.amountSell||0)),
      approvalsGranted: 0,
      providerTotal,
      providerAccepted: 0,
      selectedQuoteId:null,
      depositInstructions:null,
      events:[
        { at:Date.now(), label:'Created', detail:`${form.transactionType} • ${receiverProfile.corridor}` },
        { at:Date.now(), label:'RFQ broadcast', detail:`${getSenderProfiles().find(x=>x.id===form.senderId)?.name || 'Sender'} → ${receiver?.name || 'Receiver'}` }
      ]
    };
    S.transactions.unshift(tx);
    S.expandedTx.add(tx.id);
    closeModal();
    S.view='transactions';
    pushNotification({ title:'RFQ broadcast', body:`${id} sent to network participants.`, kind:'info', deepLink:{view:'transactions', txId:id} });
    rerender();

    setTimeout(()=>{
      if(tx.status==='Failed') return;
      tx.status='Providers responding';
      tx.events.push({ at:Date.now(), label:'Providers responding' });
      pushNotification({ title:'Network responding', body:`Quotes incoming for ${id}.`, kind:'info', deepLink:{view:'transactions', txId:id} });
      rerender();
    }, 600);
    setTimeout(()=>{
      if(tx.status==='Failed') return;
      tx.providerAccepted = Math.min(1, tx.providerTotal);
      rerender();
    }, 350);
    setTimeout(()=>{
      if(tx.status==='Failed') return;
      tx.providerAccepted = Math.min(2, tx.providerTotal);
      rerender();
    }, 700);
    setTimeout(()=>{
      if(tx.status==='Failed') return;
      tx.providerAccepted = Math.min(3, tx.providerTotal);
      rerender();
    }, 950);
    setTimeout(()=>{
      if(tx.status==='Failed') return;
      requestQuotes(tx.id);
    }, 1200);
  }

    const next = document.getElementById('cwNext');
    const back = document.getElementById('cwBack');
    const submit = document.getElementById('cwSubmit');
    const get = (id)=>document.getElementById(id);
    const collect = ()=>{
      if(get('cwDoc')){
        const [name, type] = get('cwDoc').value.split('||');
        w.form.type = type || w.form.type;
        w.form.name = `${name}.pdf`;
      }
      if(get('cwFileName')) w.form.name = get('cwFileName').textContent.trim();
      if(get('cwNotes')) w.form.notes = get('cwNotes').value.trim();
    };
    if(next){
      next.onclick = ()=>{
        collect();
        w.step = Math.min(2, w.step+1);
        refreshComplianceWizard();
      };
    }
    if(back){
      back.onclick = ()=>{
        collect();
        w.step = Math.max(0, w.step-1);
        refreshComplianceWizard();
      };
    }
    if(submit){
      submit.onclick = ()=>{
        collect();
        const name = w.form.name || 'Untitled.pdf';
        S.complianceDocs.unshift({ id:uid('doc'), name, type:w.form.type, uploadedAt:Date.now(), notes:w.form.notes||'' });
        S.complianceState = (S.complianceState==='Approved') ? 'Under Review' : S.complianceState;
        closeModal();
        pushNotification({ title:'Document added', body:`${name} added to Compliance.`, kind:'success', deepLink:{view:'compliance'} });
        rerender();
      };
    }
    const pick = document.getElementById('cwPickFile');
    if(pick){
      pick.onclick = ()=>{
        const name = w.form.name || 'Document.pdf';
        const stamp = new Date().toLocaleTimeString();
        const el = document.getElementById('cwFileName');
        if(el) el.textContent = `${name} • ${stamp}`;
      };
    }
  }

  function applyFailureIfNeeded(tx){
    if(S.failComplianceVeto){
      tx.status='Failed'; tx.failure='compliance_veto'; tx.complianceState='Veto';
      tx.events.push({ at:Date.now(), label:'Compliance veto', detail:'Common failure mode' });

    S.quoteLoading[txId]=true;
    rerender();
    const tx = S.transactions.find(t=>t.id===txId);
    if(!tx) return;
    setTimeout(()=>{
      S.quotesByTx[txId]=makeQuotes(tx);

      tx.status='Quotes Ready';
      if(tx.providerTotal){ tx.providerAccepted = tx.providerTotal; }

  function selectQuote(txId, quoteId){
    const tx = S.transactions.find(t=>t.id===txId);

    if(!tx||!q) return;

  function grantApproval(txId){
    const tx = S.transactions.find(t=>t.id===txId);
    if(!tx || tx.status==='Failed') return;
    tx.approvalsGranted = Math.min(tx.approvalsRequired, tx.approvalsGranted+1);

  function issueDepositInstructions(txId){
    const tx = S.transactions.find(t=>t.id===txId);
    if(!tx || tx.status==='Failed') return;
    const isDigital = !!tx.usesDigitalSettlement;
    const ref = `UNYX-${tx.id.replace('TX-','')}-${Math.abs(hash(tx.id))%9999}`;
    const inst = {
      method: isDigital ? 'Digital' : 'IBAN',
      account: isDigital ? '0xUNYX_DEPOSIT_VAULT' : 'IBAN: NL91 ABNA 0417 1643 00',
      reference: ref,
      whitelistRequired: isDigital ? true : false
    };
    tx.depositInstructions = inst;
    tx.status='Deposit Instructions Issued';
    tx.events.push({ at:Date.now(), label:'Deposit instructions issued', detail: inst.reference });
    pushNotification({ title:'Deposit instructions issued', body:`Deposit reference generated for ${txId}.`, kind:'info', deepLink:{view:'transactions', txId} });
    rerender();

    // detect deposit (demo)
    setTimeout(()=>{
      if(tx.status==='Failed') return;
      tx.status='Deposit Detected';
      tx.events.push({ at:Date.now(), label:'Deposit detected' });
      pushNotification({ title:'Deposit detected', body:`Funds detected for ${txId}. Confirm to continue.`, kind:'warning', deepLink:{view:'transactions', txId} });
      rerender();

  function confirmDeposit(txId){
    const tx = S.transactions.find(t=>t.id===txId);
    if(!tx || tx.status==='Failed') return;

    tx.status='Deposit Confirmed';
    tx.events.push({ at:Date.now(), label:'Deposit confirmed' });

    setTimeout(()=>{

      tx.status='Conversion Executed';

    // payout

      rerender();
    }, 2900);
  }

  function toCsv(rows){
    const cols = Array.from(rows.reduce((s,r)=>{ Object.keys(r).forEach(k=>s.add(k)); return s; }, new Set()));
    const esc = v => {
      const s = String(v ?? '');
      if (/[\\n\\r,"]/g.test(s)) return `"${s.replace(/"/g,'""')}"`;
      return s;
    };
    return [cols.join(','), ...rows.map(r=>cols.map(c=>esc(r[c])).join(','))].join('\\n');
  }
  function downloadText(filename, text){
    const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }

  // ----------------------------------
  // Network graph
  // ----------------------------------
  function buildGraph(){
    const memberNodes = S.nodes.map(n=>({ id:n.id, name:n.name, kind:'node', ref:n }));
    const nodes = [...memberNodes];
    const edges = [];
    for(let i=1;i<S.nodes.length;i++){
      edges.push({ a:S.nodes[i-1].id, b:S.nodes[i].id });
      if(i%6===0) edges.push({ a:S.nodes[i].id, b:S.nodes[Math.max(0, i-5)].id });
    }

    const pos = new Map();
    const w = 1000, h=520;
    const cx = w/2, cy = h/2;
    const outer = S.nodes.filter(n=>n.nbi);
    const inner = S.nodes.filter(n=>!n.nbi);
    const placeRing = (list, radius, offset=0)=>{
      list.forEach((n,i)=>{
        const ang = ((i / Math.max(list.length,1)) * Math.PI*2) - Math.PI/2 + offset;
        const jitter = 10 + (Math.abs(hash(n.id)) % 20);
        pos.set(n.id, {
          x: cx + Math.cos(ang) * (radius + (i%2===0 ? jitter : -jitter/2)),
          y: cy + Math.sin(ang) * (radius + (i%3===0 ? jitter/2 : -jitter/3))
        });
      });
    };
    placeRing(outer, 240, 0);
    placeRing(inner, 92, Math.PI / Math.max(inner.length, 10));

    S.graph = { nodes, edges, positions: pos, hovered:null, dragging:false, dragId:null, selectedId:S.graph.selectedId || outer[0]?.id || inner[0]?.id || null };
  }

  function drawGraph(canvas){
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);

    const W = rect.width, H = rect.height;
    ctx.clearRect(0,0,W,H);

    // background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = 'rgba(15,139,76,.05)';
    ctx.beginPath();
    ctx.arc(W/2, H/2, 120, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(39,75,143,.05)';
    ctx.beginPath();
    ctx.arc(W/2, H/2, 274, 0, Math.PI*2);
    ctx.arc(W/2, H/2, 170, 0, Math.PI*2, true);
    ctx.fill();

    ctx.strokeStyle = 'rgba(10,26,51,.18)';
    ctx.setLineDash([6,6]);
    ctx.beginPath();
    ctx.arc(W/2, H/2, 240, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(W/2, H/2, 92, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(W/2, H/2, 155, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);

    // edges
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(102,112,133,.25)';
    for(const e of S.graph.edges){
      const pa = S.graph.positions.get(e.a);
      const pb = S.graph.positions.get(e.b);
      if(!pa||!pb) continue;
      ctx.beginPath();
      ctx.moveTo(pa.x/W*W, pa.y/H*H);
      ctx.lineTo(pb.x/W*W, pb.y/H*H);
      ctx.stroke();
    }

    // nodes
    for(const n of S.graph.nodes){
      const p = S.graph.positions.get(n.id);
      if(!p) continue;
      const x = p.x, y = p.y;
      let r = 7;
      let fill = '#c7cbd6';
      const ref = n.ref;
      const blocked = S.manifest.blockedNodeIds.includes(ref.id);
      fill = ref.active ? (ref.nbi ? 'rgba(39,75,143,.95)' : 'rgba(15,139,76,.90)') : 'rgba(199,203,214,.85)';
      if(ref.riskTag==='High') fill = 'rgba(239,68,68,.85)';
      if(ref.riskTag==='Med') fill = 'rgba(245,158,11,.85)';
      if(ref.riskTag==='Low' && ref.active) fill = ref.nbi ? 'rgba(39,75,143,.95)' : 'rgba(15,139,76,.92)';
      if(blocked) fill = 'rgba(11,18,32,.9)';

      // highlight hovered
      if(S.graph.hovered===n.id){ r += 3; }
      if(S.graph.selectedId===n.id){ r += 4; }

      ctx.beginPath();
      ctx.fillStyle = fill;
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fill();

      if(S.graph.selectedId===n.id){
        ctx.strokeStyle = '#0b1220';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      if(ref.nbi || S.graph.selectedId===n.id){
        ctx.fillStyle = '#111827';
        ctx.font = '800 12px ' + getComputedStyle(document.body).fontFamily;
        ctx.fillText(n.name, x + 16, y + 4);
      }
    }

    // hover tooltip
    if(S.graph.hovered){
      const n = S.graph.nodes.find(x=>x.id===S.graph.hovered);
      if(n && n.kind==='node'){
        const ref = n.ref;
        const p = S.graph.positions.get(n.id);
        const lines = [
          ref.name,
          `Active: ${ref.active ? 'Yes' : 'No'}  |  Risk: ${ref.riskTag}`,
          `Ring: ${ref.nbi ? 'Outer / NBFI' : 'Inner / Market maker'}`,
          `Blocked: ${S.manifest.blockedNodeIds.includes(ref.id) ? 'Yes' : 'No'}`,
          `Health: ${ref.health}/100  |  Latency: ${ref.latencyMs}ms`,
          `Depth: ${formatBaseMoney(ref.liquidityUsd)}  |  Makers: ${ref.makersOnline}`,
          `Corridors: ${ref.corridors.join(', ')}`
        ];
        const pad=10, lh=16;
        ctx.font = '700 12px ' + getComputedStyle(document.body).fontFamily;
        const width = Math.max(...lines.map(s=>ctx.measureText(s).width)) + pad*2;
        const height = lines.length*lh + pad*2;
        const x = clamp(p.x + 14, 10, W - width - 10);
        const y = clamp(p.y - height - 10, 10, H - height - 10);
        ctx.fillStyle = 'rgba(255,255,255,.98)';
        ctx.strokeStyle = 'rgba(230,232,239,1)';
        ctx.lineWidth = 1;
        roundRect(ctx, x, y, width, height, 12, true, true);
        ctx.fillStyle = '#111827';
        lines.forEach((s,i)=>ctx.fillText(s, x+pad, y+pad + (i+1)*lh - 4));
      }
    }
  }

  function roundRect(ctx, x, y, w, h, r, fill, stroke){
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
    if(fill) ctx.fill();
    if(stroke) ctx.stroke();
  }

  function attachGraphHandlers(canvas){
    const hit = (mx,my)=>{
      for(const n of S.graph.nodes){
        const p = S.graph.positions.get(n.id);
        if(!p) continue;
        const r = 12;
        const dx = mx - p.x, dy = my - p.y;
        if(dx*dx + dy*dy <= r*r) return n.id;
      }
      return null;
    };
    canvas.onmousemove = (e)=>{
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      if(S.graph.dragging && S.graph.dragId){
        const p = S.graph.positions.get(S.graph.dragId);
        p.x = mx; p.y = my;
        drawGraph(canvas);
        return;
      }
      const id = hit(mx,my);
      if(id!==S.graph.hovered){
        S.graph.hovered = id;
        drawGraph(canvas);
      }
    };
    canvas.onmousedown = (e)=>{
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const id = hit(mx,my);
      if(id){
        S.graph.dragging=true;
        S.graph.dragId=id;
      }
    };
    canvas.onclick = (e)=>{
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const id = hit(mx,my);
      if(id){
        S.graph.selectedId = id;
        rerender();
      }
    };
    window.addEventListener('mouseup', ()=>{
      S.graph.dragging=false;
      S.graph.dragId=null;
    });
  }

  function renderBalances(){
    const total = S.balances.reduce((s,b)=>s+b.usdValue,0);
    const filters = S.balanceFilters;
    const filtered = S.balances
            .filter(b=>!filters.search || `${b.assetName} ${b.assetCode}`.toLowerCase().includes(filters.search.toLowerCase()))
            .filter(b=>filters.assetType==='all' || b.assetType===filters.assetType)
            .filter(b=>filters.depositEnabled==='all' || String(b.depositEnabled)===filters.depositEnabled)
            .filter(b=>filters.withdrawalEnabled==='all' || String(b.withdrawalEnabled)===filters.withdrawalEnabled)
            .filter(b=>filters.jurisdiction==='all' || b.jurisdiction===filters.jurisdiction)
            .filter(b=>filters.network==='all' || b.networkRail===filters.network)
            .sort((a,b)=>{
              const { key, dir } = S.balanceSort;
              const left = key==='baseValue' ? convertAmount(a.usdValue, 'USD', S.baseCurrency) : a[key];
              const right = key==='baseValue' ? convertAmount(b.usdValue, 'USD', S.baseCurrency) : b[key];
              const factor = dir==='asc' ? 1 : -1;
              if(typeof left==='number' && typeof right==='number') return (left-right) * factor;
              return String(left).localeCompare(String(right)) * factor;
            });
    const uniqueJurisdictions = Array.from(new Set(S.balances.map(b=>b.jurisdiction))).sort();
    const uniqueNetworks = Array.from(new Set(S.balances.map(b=>b.networkRail))).sort();
    const sortCaret = (key)=>S.balanceSort.key===key ? (S.balanceSort.dir==='asc' ? '↑' : '↓') : '';

    <div class="header">
      <div>

      </div>
    </div>

    <div class="card section" style="margin-top:14px">
      <div class="title"><h2>Assets</h2><span class="small">${filtered.length} visible</span></div>
      <div class="table-controls">
        <div class="field"><label>Search</label><input id="balSearch" value="${escapeHtml(filters.search)}" placeholder="Asset name or code"></div>
        <div class="field compact"><label>Asset class</label><select id="balType">${['all','fiat','stablecoin','token','deposit'].map(v=>`<option value="${v}" ${filters.assetType===v?'selected':''}>${v}</option>`).join('')}</select></div>
        <div class="field compact"><label>Deposit</label><select id="balDeposit">${[{v:'all',t:'all'},{v:'true',t:'enabled'},{v:'false',t:'disabled'}].map(x=>`<option value="${x.v}" ${filters.depositEnabled===x.v?'selected':''}>${x.t}</option>`).join('')}</select></div>
        <div class="field compact"><label>Withdrawal</label><select id="balWithdrawal">${[{v:'all',t:'all'},{v:'true',t:'enabled'},{v:'false',t:'disabled'}].map(x=>`<option value="${x.v}" ${filters.withdrawalEnabled===x.v?'selected':''}>${x.t}</option>`).join('')}</select></div>
        <div class="field compact"><label>Jurisdiction</label><select id="balJurisdiction"><option value="all">all</option>${uniqueJurisdictions.map(v=>`<option value="${v}" ${filters.jurisdiction===v?'selected':''}>${v}</option>`).join('')}</select></div>
        <div class="field compact"><label>Network / rail</label><select id="balNetwork"><option value="all">all</option>${uniqueNetworks.map(v=>`<option value="${v}" ${filters.network===v?'selected':''}>${v}</option>`).join('')}</select></div>
      </div>
      <div class="tablewrap">
        <table>
          <thead>
            <tr>
              <th class="sortable ${S.balanceSort.key==='assetName'?'active':''}" data-balsort="assetName">Asset Name ${sortCaret('assetName')}</th>
              <th class="sortable ${S.balanceSort.key==='assetCode'?'active':''}" data-balsort="assetCode">Asset Code ${sortCaret('assetCode')}</th>
              <th>Asset Type</th>
              <th class="right sortable ${S.balanceSort.key==='balance'?'active':''}" data-balsort="balance">Balance ${sortCaret('balance')}</th>
              <th class="right">Available</th>
              <th class="right">Locked</th>
              <th>Fee Type</th>
              <th>Stablecoin / Token</th>

              <th>Withdrawal</th>
              <th>Network / Rail</th>

          </thead>
          <tbody>
            ${filtered.map(b=>`
              <tr>
                <td><b>${escapeHtml(b.assetName)}</b><div class="mini">${escapeHtml(b.jurisdiction)}</div></td>
                <td><span class="badge">${escapeHtml(b.assetCode)}</span></td>

                <td class="right">${formatNumber(b.available,2)}</td>

          </tbody>
        </table>

  function bindBalances(){
    const map = [
      ['balSearch','search'],
      ['balType','assetType'],
      ['balDeposit','depositEnabled'],
      ['balWithdrawal','withdrawalEnabled'],
      ['balJurisdiction','jurisdiction'],
      ['balNetwork','network']
    ];
    map.forEach(([id,key])=>{
      const el = document.getElementById(id);
      if(!el) return;
      el.oninput = el.onchange = ()=>{
        S.balanceFilters[key] = el.value;
        rerender();
      };
    });
    document.querySelectorAll('[data-balsort]').forEach(el=>{
      el.onclick = ()=>{
        const key = el.getAttribute('data-balsort');
        if(S.balanceSort.key===key){
          S.balanceSort.dir = S.balanceSort.dir==='asc' ? 'desc' : 'asc';
        }else{
          S.balanceSort = { key, dir:key==='assetName' || key==='assetCode' ? 'asc' : 'desc' };
        }
        rerender();
      };
    });
  }

  // ----------------------------------
  // Transactions (expandable + drilldown)
  // ----------------------------------
  function statusBadge(tx){
    const s = tx.status;
    if(s==='Failed') return `<span class="badge bad">Failed</span>`;
    if(s==='Settled') return `<span class="badge good">Settled</span>`;
    if(s==='Deposit Detected') return `<span class="badge warn">Deposit detected</span>`;
    if(s==='Approval Requested') return `<span class="badge yellow">Approval requested</span>`;
    if(s==='Approved') return `<span class="badge good">Approved</span>`;
    if(s==='Quotes Ready') return `<span class="badge blue">Quotes ready</span>`;
    return `<span class="badge">${escapeHtml(s)}</span>`;
  }
  function renderProviderProgress(tx){
    if(!tx.providerTotal) return '';
    const accepted = Math.min(tx.providerAccepted||0, tx.providerTotal);
    const pct = Math.round((accepted/tx.providerTotal)*100);
    const label = `${accepted} of ${tx.providerTotal} providers accepted`;
    return `
    <div class="mini" style="margin-top:4px">${label}</div>
    <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
  `;
  }
  function getWorkflowStages(tx){
    const lastEventAt = (labelPart)=>{
      const found = tx.events.slice().reverse().find(ev=>ev.label.toLowerCase().includes(labelPart));
      return found ? found.at : null;
    };
    const done = (labels)=>labels.some(label=>tx.events.some(ev=>ev.label.toLowerCase().includes(label)));
    const failed = tx.status==='Failed';
    const manualRequired = tx.approvalsRequired > 1 || tx.complianceState==='Review';
    return [
      { name:'Initiated', state:done(['created']) ? 'done' : 'current', time:lastEventAt('created'), note:'Transaction opened and sender/receiver context attached.' },
      { name:'Route Computed', state:done(['quote selected']) || done(['quotes ready']) ? 'done' : 'current', time:lastEventAt('quotes ready'), note:'Routing preview and route candidates prepared.' },
      { name:'RFQ / Bids', state:done(['quotes ready']) ? 'done' : (tx.status==='RFQ Requested' || tx.status==='Providers responding' ? 'current' : 'pending'), time:lastEventAt('quotes ready'), note:`${tx.providerAccepted||0}/${tx.providerTotal||0} providers accepted.` },
      { name:'Compliance Check', state:failed && tx.failure==='compliance_veto' ? 'failed' : (tx.complianceState==='OK' ? 'done' : 'current'), time:lastEventAt('compliance'), note:`Compliance state: ${tx.complianceState}` },
      { name:'Manual Approval', state:failed && tx.failure==='quote_expired' ? 'failed' : (tx.approvalsGranted>=tx.approvalsRequired ? 'done' : (manualRequired ? 'manual' : 'done')), time:lastEventAt('approval'), note:`${tx.approvalsGranted}/${tx.approvalsRequired} approvals granted.` },
      { name:'Execution', state:done(['deposit instructions issued']) ? 'done' : (tx.status==='Approved' ? 'current' : 'pending'), time:lastEventAt('deposit instructions'), note:'Deposit instructions issued and route locked.' },
      { name:'Settlement', state:done(['conversion executed']) || done(['settled']) ? 'done' : (tx.status==='Deposit Detected' || tx.status==='Deposit Confirmed' ? 'current' : 'pending'), time:lastEventAt('conversion'), note:tx.usesDigitalSettlement ? 'Digital settlement leg enabled.' : 'Bank rail payout only.' },
      { name:'Ledger Written', state:tx.status==='Settled' ? 'done' : (failed ? 'failed' : 'pending'), time:lastEventAt('settled'), note:'Double-entry ledger evidence available.' },
      { name:'Complete / Failed', state:failed ? 'failed' : (tx.status==='Settled' ? 'done' : (tx.status==='Payout Initiated' ? 'current' : 'pending')), time:tx.status==='Settled' || failed ? Date.now() : null, note:failed ? (tx.failure==='quote_expired' ? 'Quote expired.' : 'Compliance veto.') : `Current status: ${tx.status}` }
    ];
  }

  function exportTransactionDetails(txId){
    const tx = S.transactions.find(t=>t.id===txId);
    if(!tx) return;
    const ben = S.beneficiaries.find(b=>b.id===tx.beneficiaryId);
    const quote = (S.quotesByTx[tx.id]||[]).find(q=>q.id===tx.selectedQuoteId);
    const rows = [
      {
        recordType:'transaction',
        txId:tx.id,
        status:tx.status,
        sellAsset:tx.sellAsset,
        buyAsset:tx.buyAsset,
        amountSell:tx.amountSell,
        normalizedBase: convertAmount(normalizeAssetValue(tx.amountSell, tx.sellAsset),'USD',S.baseCurrency),
        baseCurrency:S.baseCurrency,
        corridor:tx.corridor,
        route:tx.route.join(' -> '),
        sender:tx.senderName || 'UNYX Treasury Desk',
        receiver:tx.receiverName || ben?.name || '',
        approvalsGranted:tx.approvalsGranted,
        approvalsRequired:tx.approvalsRequired,
        complianceState:tx.complianceState,
        quoteRate:quote?.rate || '',
        quoteSpreadBps:quote?.spreadBps || '',
        quoteFeeBps:quote?.feeBps || '',
        quoteFeeBase:quote ? convertAmount(quote.feeAbs, 'USD', S.baseCurrency) : '',
        depositReference:tx.depositInstructions?.reference || '',

      ...tx.events.map(ev=>({
        recordType:'event',

        eventLabel:ev.label,
        eventDetail:ev.detail || '',
        eventAt:new Date(ev.at).toISOString(),
        statusAtExport:tx.status
      }))
    ];
    downloadText(`unyx_transaction_${tx.id}_${new Date().toISOString().slice(0,10)}.csv`, toCsv(rows));

  function bindTransactions(){
    document.getElementById('mkTx').onclick = ()=>{
      openRfqWizard();
    };

    document.querySelectorAll('[data-exp]').forEach(el=>{
      el.onclick = ()=>{
        const id = el.getAttribute('data-exp');
        if(S.expandedTx.has(id)) S.expandedTx.delete(id); else S.expandedTx.add(id);
        rerender();
      };
    });

    document.querySelectorAll('[data-rfq]').forEach(el=>{
      el.onclick = ()=> requestQuotes(el.getAttribute('data-rfq'));

      el.onclick = ()=> openTransactionMetadata(el.getAttribute('data-opentxmeta'));

      el.onclick = ()=> exportTransactionDetails(el.getAttribute('data-exporttx'));
    });

    document.querySelectorAll('[data-openquotes]').forEach(el=>{

        // open modal to select quote

          openModal({ title:'Select quote', subtitle:`${txId}`, contentHtml:`<div class="small">No quotes loaded yet.</div>` });

        openModal({
          title:'Select quote',
          subtitle:`${txId} — choose route + pricing`,

  function bindManifest(){
    document.getElementById('manifestWizardBtn').onclick = ()=> openManifestWizard();
    const applyPolicy = document.getElementById('applyPolicySurface');
    if(applyPolicy){
      applyPolicy.onclick = ()=>{
        S.manifest.whitelistedCurrencies = splitCsvInput(document.getElementById('mfWhitelistCurrencies').value);
        S.manifest.whitelistedJurisdictions = splitCsvInput(document.getElementById('mfWhitelistJurisdictions').value);
        S.manifest.blacklistedCurrencies = splitCsvInput(document.getElementById('mfBlacklistCurrencies').value);
        S.manifest.blacklistedJurisdictions = splitCsvInput(document.getElementById('mfBlacklistJurisdictions').value);
        S.manifest.manualApprovalCurrencies = splitCsvInput(document.getElementById('mfManualCurrencies').value);
        S.manifest.manualApprovalJurisdictions = splitCsvInput(document.getElementById('mfManualJurisdictions').value);
        S.manifest.blockedNodeIds = splitCsvInput(document.getElementById('mfBlockedNodes').value);
        S.manifest.policyPack = 'Custom';
        S.manifest.updatedAt = Date.now();
        S.manifest.version = (Number(S.manifest.version)||0) + 1;
        S.manifestState = 'Submitted';
        S.manifestLastChange = 'Updated: policy surface';
        pushNotification({ title:'Manifest policy updated', body:'Whitelist, blacklist, manual approval, and blocked nodes updated.', kind:'success', deepLink:{view:'manifest'} });
        rerender();
      };
    }
    document.getElementById('manifestJsonBtn').onclick = ()=>{
      const draft = JSON.stringify(S.manifest, null, 2);
      openModal({
        title:'Update manifest (JSON)',
        subtitle:'Apply always succeeds, closes modal, bumps version + timestamp, marks Submitted',
        contentHtml: `
        <div class="two">
          <div>
            <div class="field">
              <label>Manifest JSON (editable)</label>
              <textarea id="mfDraft">${escapeHtml(draft)}</textarea>
            </div>
            <div id="mfErr" class="small" style="color:var(--bad); display:none"></div>
            <div class="row" style="justify-content:flex-end; margin-top:10px">
              <button class="btn" id="mfPreview">Preview</button>
              <button class="btn primary" id="mfApply">Apply update</button>
            </div>
            <div class="small" style="margin-top:10px">Apply increments version + updates timestamp + marks as Submitted even if nothing changed.</div>
          </div>

          <div>
            <div class="field">
              <label>Preview</label>
              <div class="card" style="padding:12px; box-shadow:none; min-height:360px; overflow:auto">
                <div id="mfPreviewBox" class="small">Click Preview to validate and view changes.</div>
              </div>
            </div>
          </div>
        </div>
      `
      });

      setTimeout(()=>{
        const err = document.getElementById('mfErr');
        const previewBox = document.getElementById('mfPreviewBox');

        function parseDraft(){
          err.style.display='none'; err.textContent='';
          const raw = document.getElementById('mfDraft').value;
          try{
            const parsed = JSON.parse(raw);
            return parsed;
          }catch(e){
            err.textContent = 'Invalid JSON: ' + e.message;
            err.style.display='block';
            return null;
          }
        }

        document.getElementById('mfPreview').onclick = ()=>{
          const parsed = parseDraft();
          if(!parsed) return;
          // show top-level keys + some derived differences
          const keys = Object.keys(parsed).sort();
          previewBox.innerHTML = `
          <div style="font-weight:900">Top-level keys</div>
          <div class="divider"></div>
          <pre class="mono">${escapeHtml(JSON.stringify(keys, null, 2))}</pre>
          <div class="divider"></div>
          <div style="font-weight:900">Normalized summary</div>
          <div class="small">
            Base: <b>${escapeHtml(parsed.baseCurrency||'USD')}</b><br/>
            Corridors: <b>${(parsed.corridors||[]).length}</b><br/>
            Limits: <b>${formatMoney((parsed.limits||{}).min||100000,'USD')}</b> - <b>${formatMoney((parsed.limits||{}).max||15000000,'USD')}</b><br/>
            Digital settlement: <b>${(parsed.settlement||{}).digitalSettlement?'Enabled':'Disabled'}</b>
          </div>
        `;
        };

        document.getElementById('mfApply').onclick = ()=>{
          const parsed = parseDraft();
          // Apply ALWAYS works: if invalid, we still allow Apply by preserving old manifest, but we should be honest:
          // We'll treat invalid JSON as "no change" and still submit, per your rule #1.
          let next = parsed || S.manifest;

          // bump version + timestamp; mark Submitted
          next = { ...next };
          next.version = (Number(next.version)||0) + 1;
          next.updatedAt = Date.now();

          // record change label
          const changed = [];
          if(parsed){
            // minimal change detection
            if(JSON.stringify(S.manifest.corridors)!==JSON.stringify(next.corridors)) changed.push('corridors');
            if(JSON.stringify(S.manifest.limits)!==JSON.stringify(next.limits)) changed.push('limits');
            if(JSON.stringify(S.manifest.settlement)!==JSON.stringify(next.settlement)) changed.push('settlement');
            if(JSON.stringify(S.manifest.baseCurrency)!==JSON.stringify(next.baseCurrency)) changed.push('baseCurrency');
          }

          S.manifest = normalizeManifest(next);
          S.manifest.policyPack = 'Custom';
          S.manifestState = 'Submitted';
          S.manifestLastChange = changed.length ? ('Updated: ' + changed.join(', ')) : 'Manifest updated';
          closeModal();

          pushNotification({
            title:'Manifest updated',
            body:`${S.manifestLastChange}. Version ${S.manifest.version}.`,
            kind:'success',
            deepLink:{view:'manifest'}
          });

          rerender();
        };
      },0);
    };
    document.querySelectorAll('#policyPack [data-pack]').forEach(b=>{
      b.onclick = ()=>{
        const pack = b.getAttribute('data-pack');
        applyPolicyPack(pack);
        rerender();
      };
    });
  }
